<!DOCTYPE html>
<html>
<head>
    <title>SmartLender - Result</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .result-box { background: white; padding: 40px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0px 0px 10px #aaa; }
        h1 { margin-top: 0; }
        .probability { font-size: 20px; color: #555; }
        a { text-decoration: none; background: #007bff; color: white; padding: 10px 20px; border-radius: 5px; display: inline-block; margin-top: 20px;}
        a:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="result-box">
    <h1 style="color: green">{{ prediction }}</h1>
    
    <p class="probability">
        Model Confidence: <strong>{{ probability }}%</strong>
    </p>

    <a href="/">Apply for Another Loan</a>
</div>

</body>
</html>
