<!doctype html>
<html>
  <head>
    <title>SmartLender - Loan Application</title>
    <style>
      body {
        font-family: Arial;
        background-color: #f4f4f4;
        padding: 20px;
      }
      .form-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0px 0px 10px #aaa;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        background-color: #28a745;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
      }
      button:hover {
        background-color: #218838;
      }
    </style>
  </head>
  <body>
    <div style="text-align: right; padding: 15px; background: #f4f4f4">
      <a
        href="/"
        style="text-decoration: none; color: #2c3e50; font-weight: bold"
        >← Back to Home</a
      >
    </div>

    <div class="form-container">
      <h2>Loan Application Form</h2>
      <form action="/predict" method="POST">
        <label>Gender:</label>
        <select name="Gender" required>
          <option value="1">Male</option>
          <option value="0">Female</option>
        </select>

        <label>Married:</label>
        <select name="Married" required>
          <option value="1">Yes</option>
          <option value="0">No</option>
        </select>

        <label>Dependents:</label>
        <select name="Dependents" required>
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3+</option>
        </select>

        <label>Education:</label>
        <select name="Education" required>
          <option value="0">Not Graduate</option>
          <option value="1">Graduate</option>
        </select>

        <label>Self Employed:</label>
        <select name="Self_Employed" required>
          <option value="1">Yes</option>
          <option value="0">No</option>
        </select>

        <label>Applicant Income:</label>
        <input
          type="number"
          name="ApplicantIncome"
          placeholder="e.g., 5000"
          required
        />

        <label>Coapplicant Income:</label>
        <input
          type="number"
          name="CoapplicantIncome"
          placeholder="e.g., 0"
          required
        />

        <label>Loan Amount (in thousands):</label>
        <input
          type="number"
          name="LoanAmount"
          placeholder="e.g., 150"
          required
        />

        <label>Loan Amount Term (days):</label>
        <select name="Loan_Amount_Term" required>
          <option value="360">360</option>
          <option value="180">180</option>
          <option value="240">240</option>
          <option value="120">120</option>
        </select>

        <label>Credit History:</label>
        <select name="Credit_History" required>
          <option value="1">Meets guidelines (1)</option>
          <option value="0">Does not meet (0)</option>
        </select>

        <label>Property Area:</label>
        <select name="Property_Area" required>
          <option value="2">Urban</option>
          <option value="1">Semiurban</option>
          <option value="0">Rural</option>
        </select>

        <button type="submit">Check Loan Status</button>
      </form>
    </div>
  </body>
</html>
